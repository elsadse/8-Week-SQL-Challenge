services:
  postgres:
    image: postgres:alpine
    hostname: ${POSTGRES_HOSTNAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h ${POSTGRES_HOSTNAME} -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  
  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PGADMIN_DEFAULT_PORT}:80"
    volumes:
      - ./pgadmin-load-servers.sh:/pgadmin-load-servers.sh
      - pgadmin_data:/var/lib/pgadmin
    entrypoint: ["/bin/sh", "/pgadmin-load-servers.sh"]

volumes:
  pgdata: {}
  pgadmin_data: {}